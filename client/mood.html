<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Your Mood</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>How are you feeling today?</h1>

        <p>Choose your mood and discover amazing destinations ✈️</p>

        <div class="mood-container">

            <div class="mood-card" onclick="selectMood('Happy')">
                <h2>Happy</h2>
            </div>

            <div class="mood-card" onclick="selectMood('Relaxed')">
                <h2>Relaxed</h2>
            </div>

            <div class="mood-card" onclick="selectMood('Adventurous')">
                <h2>Adventurous</h2>
            </div>

            <div class="mood-card" onclick="selectMood('Sad')">
                <h2>Sad</h2>
            </div>

            <div class="mood-card" onclick="selectMood('Excited')">
                <h2>Excited</h2>
            </div>

            <div class="mood-card" onclick="selectMood('Stressed')">
                <h2>Stressed</h2>
            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
