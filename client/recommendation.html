<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recommended Destinations</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1 id="title"></h1>

        <div class="mood-container" id="destinationContainer"></div>

    </div>

    <script src="destinations.js"></script>

    <script>

        const mood = localStorage.getItem("selectedMood");

        document.getElementById("title").innerText =
            "Destinations for " + mood;

        const places = destinations[mood];

        const container =
            document.getElementById("destinationContainer");

        places.forEach(function (place) {

            container.innerHTML += `

                <div class="mood-card">

                    <h2>${place.name}</h2>

                    <p>${place.description}</p>

                </div>

            `;

        });

    </script>

</body>
</html>
